name: Release

concurrency:
  group: release
  cancel-in-progress: true

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
      - name: Frontend lint
        run: bunx eslint src/
      - name: Frontend format
        run: bunx prettier --check src/
      - name: Frontend type check
        run: bunx vue-tsc --noEmit
      - name: Frontend tests
        run: bunx vitest run

  build:
    needs: ci
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.args }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.args }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/homewizard-desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'HWTray ${{ github.ref_name }}'
          releaseBody: |
            ### Install

            1. Download the `.dmg` file for your architecture below
            2. Drag **HWTray** to Applications
            3. Open HWTray from Applications
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
