name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
      - name: Frontend lint
        run: bunx eslint src/
      - name: Frontend format
        run: bunx prettier --check src/
      - name: Frontend type check
        run: bunx vue-tsc --noEmit
      - name: Frontend tests
        run: bunx vitest run
      - name: Build frontend
        run: bunx vite build

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/bump-version.js check

  tag-on-bump:
    needs: [check, version-consistency]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Detect version bump
        id: v
        run: |
          NEW=$(node scripts/bump-version.js current)
          OLD=$(git show HEAD~1:Cargo.toml 2>/dev/null | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        if: steps.v.outputs.bumped == 'true'
        run: |
          TAG="v${{ steps.v.outputs.new }}"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists — skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG — release.yml will build the binaries."
