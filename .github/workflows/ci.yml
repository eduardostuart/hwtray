name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
      - name: Frontend lint
        run: bunx eslint src/
      - name: Frontend format
        run: bunx prettier --check src/
      - name: Frontend type check
        run: bunx vue-tsc --noEmit
      - name: Frontend tests
        run: bunx vitest run
      - name: Build frontend
        run: bunx vite build

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/bump-version.js check

  tag-on-bump:
    needs: [check, version-consistency]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Detect version bump
        id: v
        run: |
          NEW=$(node scripts/bump-version.js current)
          OLD=$(git show HEAD~1:crates/homewizard-desktop/Cargo.toml 2>/dev/null | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        id: tag
        if: steps.v.outputs.bumped == 'true'
        run: |
          TAG="v${{ steps.v.outputs.new }}"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists — skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: [check, version-consistency, tag-on-bump]
    # Runs when either (a) a tag was just pushed by tag-on-bump or
    # (b) a developer manually pushed a vX.Y.Z tag. In the PR and
    # no-bump-on-main cases, it stays skipped.
    if: |
      always()
      && needs.check.result == 'success'
      && needs.version-consistency.result == 'success'
      && (
        startsWith(github.ref, 'refs/tags/v')
        || needs.tag-on-bump.outputs.created == 'true'
      )
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.args }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.args }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/homewizard-desktop
          tagName: ${{ needs.tag-on-bump.outputs.tag || github.ref_name }}
          releaseName: 'HWTray ${{ needs.tag-on-bump.outputs.tag || github.ref_name }}'
          releaseBody: |
            ### Install

            1. Download the `.dmg` file for your architecture below
            2. Drag **HWTray** to Applications
            3. Open HWTray from Applications
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
