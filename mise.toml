[tools]
rust = "stable"
node = "24"
bun = "latest"

[env]
RUST_LOG = "debug"

# ------------------------------------------------------------------------------
# Development
# ------------------------------------------------------------------------------

[tasks.dev]
description = "Desktop app with hot reload"
run = "bunx tauri dev"

[tasks."dev:front"]
description = "Frontend only"
run = "bunx vite"

# ------------------------------------------------------------------------------
# Build
# ------------------------------------------------------------------------------

[tasks.build]
description = "Build desktop app"
depends = ["build:front"]
run = "bunx tauri build"

[tasks."build:front"]
description = "Frontend assets"
run = "bunx vue-tsc --noEmit && bunx vite build"

# ------------------------------------------------------------------------------
# Test
# ------------------------------------------------------------------------------

[tasks.test]
description = "Run all tests"
depends = ["test:back", "test:front"]

[tasks."test:back"]
description = "Rust tests"
run = "cargo test --workspace"

[tasks."test:front"]
description = "Frontend tests"
run = "bunx vitest run"

# ------------------------------------------------------------------------------
# Code Quality
# ------------------------------------------------------------------------------

[tasks.check]
description = "Type check all"
depends = ["check:front", "check:back"]

[tasks."check:front"]
run = "bunx vue-tsc --noEmit"

[tasks."check:back"]
run = "cargo check --workspace --all-targets --all-features"

[tasks.lint]
description = "Lint all"
depends = ["lint:front", "lint:back"]

[tasks."lint:front"]
run = "bunx eslint src/"

[tasks."lint:back"]
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks."lint:fix"]
description = "Fix lint issues"
run = "bunx eslint src/ --fix && cargo fmt --all"

[tasks.fmt]
description = "Format all"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check formatting"
run = "cargo fmt --all -- --check"

# ------------------------------------------------------------------------------
# CI
# ------------------------------------------------------------------------------

[tasks.ci]
description = "Run all CI checks"
depends = ["fmt:check", "lint", "check", "test"]

# ------------------------------------------------------------------------------
# Setup
# ------------------------------------------------------------------------------

[tasks.setup]
description = "Install git hooks and dependencies"
run = "bash scripts/install-hooks.sh && bun install"

[tasks.install]
description = "Install dependencies"
run = "bun install"

# ------------------------------------------------------------------------------
# Utils
# ------------------------------------------------------------------------------

[tasks.bump]
description = "Bump version (e.g. mise run bump 0.2.0)"
run = "bash scripts/bump-version.sh {{arg(i=0)}}"

[tasks.release]
description = "Bump, commit, tag, push (e.g. mise run release 0.2.0)"
run = "bash scripts/release.sh {{arg(i=0)}}"

[tasks.clean]
description = "Remove build artifacts"
run = "cargo clean && rm -rf dist node_modules/.vite"
